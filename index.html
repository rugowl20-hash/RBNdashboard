<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rugs By Nature Dashboard</title>

  <!-- Tailwind & Font Awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <!-- Firebase SDK (CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

  <script>
    // ============================================================
    //  YOUR FIREBASE CONFIG (copied from your screenshot)
    // ============================================================
    const firebaseConfig = {
      apiKey: "AIzaSyBIl_Xo_hnBhckvmd4AuxBDdyXC47SEDSU",
      authDomain: "rbdashboard-df273.firebaseapp.com",
      projectId: "rbdashboard-df273",
      storageBucket: "rbdashboard-df273.firebasestorage.app",
      messagingSenderId: "88082718465",
      appId: "1:88082718465:web:a413af423d9255a27ac500",
      measurementId: "G-7K39EBQ6ZH"
    };

    // Initialise Firebase (with error handling)
    let db = null;
    try {
      firebase.initializeApp(firebaseConfig);
      db = firebase.firestore();
      console.log('✅ Firebase initialised successfully.');
    } catch (e) {
      console.error('❌ Firebase init error:', e);
    }

    // ============================================================
    //  DEFAULT SAMPLE DATA (so dashboard shows immediately)
    // ============================================================
    const DEFAULT_ORDERS = [
      { id: 1, date: '2026-07-13', brand: 'RBN(PB)', marketplace: 'Amazon', design: 'CECIL GREEN', size: '9X12', sku: 'CEC-GRE-9X12-001', qty: 1, sales: 590, status: 'Delivered', carrier: 'UPS', tracking: '1Z999AA10123456784', remarks: 'Priority packaging' },
      { id: 2, date: '2026-07-12', brand: 'BM(RRP)', marketplace: 'Etsy', design: 'IKAT BROWN', size: '8X10', sku: 'IKA-BRO-8X10-192', qty: 1, sales: 320, status: 'Pending', carrier: '', tracking: '', remarks: '' }
    ];

    const DEFAULT_INVENTORY = [
      { sku: 'CEC-GRE-9X12-001', design: 'CECIL GREEN', size: '9X12', location: 'UP', opening: 15, sold: 1, current: 14, image: '', imageFile: '' },
      { sku: 'IKA-BRO-8X10-192', design: 'IKAT BROWN', size: '8X10', location: 'UP', opening: 6, sold: 1, current: 5, image: '', imageFile: '' }
    ];

    // ============================================================
    //  GLOBAL STATE
    // ============================================================
    let appState = {
      orders: [...DEFAULT_ORDERS],
      inventory: [...DEFAULT_INVENTORY],
      // you can add other collections later
    };

    // ============================================================
    //  FIRESTORE SYNC FUNCTIONS (background)
    // ============================================================
    async function loadFromFirestore() {
      if (!db) return;
      try {
        // Try to load orders
        const ordersDoc = await db.collection('orders').doc('master').get();
        if (ordersDoc.exists) {
          const data = ordersDoc.data().data || [];
          if (data.length) appState.orders = data;
          console.log('📦 Orders loaded from Firestore.');
        } else {
          // First time – seed Firestore with default data
          await db.collection('orders').doc('master').set({ data: DEFAULT_ORDERS });
          console.log('📦 Seeded Firestore with default orders.');
        }

        // Load inventory
        const invDoc = await db.collection('inventory').doc('master').get();
        if (invDoc.exists) {
          const data = invDoc.data().data || [];
          if (data.length) appState.inventory = data;
          console.log('📦 Inventory loaded from Firestore.');
        } else {
          await db.collection('inventory').doc('master').set({ data: DEFAULT_INVENTORY });
          console.log('📦 Seeded Firestore with default inventory.');
        }

        // Re‑render everything with fresh data
        renderAll();
      } catch (err) {
        console.warn('⚠️ Firestore sync failed – using default data.', err);
        // Still render with default data (already set)
        renderAll();
      }
    }

    async function saveOrdersToFirestore() {
      if (!db) return;
      try {
        await db.collection('orders').doc('master').set({ data: appState.orders });
        console.log('✅ Orders saved to Firestore.');
      } catch (e) { console.warn('⚠️ Could not save orders:', e); }
    }

    async function saveInventoryToFirestore() {
      if (!db) return;
      try {
        await db.collection('inventory').doc('master').set({ data: appState.inventory });
        console.log('✅ Inventory saved to Firestore.');
      } catch (e) { console.warn('⚠️ Could not save inventory:', e); }
    }

    // ============================================================
    //  RENDER FUNCTIONS (simple, clean)
    // ============================================================
    function renderAll() {
      renderDashboard();
      renderOrders();
      renderInventory();
      // (add more as needed)
    }

    function renderDashboard() {
      const orders = appState.orders;
      const totalOrders = orders.length;
      const totalSales = orders.reduce((sum, o) => sum + (o.sales || 0), 0);
      const pending = orders.filter(o => o.status === 'Pending').length;

      document.getElementById('dashboardKpis').innerHTML = `
        <div class="card p-4"><div class="text-xs uppercase text-slate-400">Orders</div><div class="text-2xl font-bold">${totalOrders}</div></div>
        <div class="card p-4"><div class="text-xs uppercase text-slate-400">Revenue</div><div class="text-2xl font-bold">$${totalSales.toFixed(2)}</div></div>
        <div class="card p-4"><div class="text-xs uppercase text-slate-400">Pending</div><div class="text-2xl font-bold">${pending}</div></div>
      `;

      // Brand performance
      const brandStats = {};
      orders.forEach(o => {
        if (!brandStats[o.brand]) brandStats[o.brand] = { orders: 0, revenue: 0 };
        brandStats[o.brand].orders++;
        brandStats[o.brand].revenue += (o.sales || 0);
      });
      let rows = '';
      Object.keys(brandStats).forEach(b => {
        rows += `<tr><td><strong>${b}</strong></td><td>${brandStats[b].orders}</td><td>$${brandStats[b].revenue.toFixed(2)}</td></tr>`;
      });
      document.getElementById('dashboardBrandTableBody').innerHTML = rows || '<tr><td colspan="3">No data</td></tr>';
    }

    function renderOrders() {
      const tbody = document.getElementById('ordersTableBody');
      if (!tbody) return;
      tbody.innerHTML = appState.orders.map(o => `
        <tr>
          <td>${o.date}</td>
          <td><strong>${o.brand}</strong></td>
          <td>${o.design}</td>
          <td>${o.size}</td>
          <td><code>${o.sku}</code></td>
          <td>${o.qty}</td>
          <td>$${o.sales.toFixed(2)}</td>
          <td><span class="badge ${o.status === 'Delivered' ? 'badge-green' : o.status === 'Pending' ? 'badge-yellow' : 'badge-blue'}">${o.status}</span></td>
        </tr>
      `).join('') || '<tr><td colspan="8">No orders</td></tr>';
    }

    function renderInventory() {
      const tbody = document.getElementById('inventoryTableBody');
      if (!tbody) return;
      tbody.innerHTML = appState.inventory.map(i => `
        <tr>
          <td><code>${i.sku}</code></td>
          <td>${i.design}</td>
          <td>${i.size}</td>
          <td>${i.location}</td>
          <td>${i.opening}</td>
          <td>${i.sold}</td>
          <td><strong>${i.current}</strong></td>
          <td><span class="badge ${i.current > 5 ? 'badge-green' : i.current > 0 ? 'badge-yellow' : 'badge-red'}">${i.current > 5 ? 'In Stock' : i.current > 0 ? 'Low Stock' : 'Out of Stock'}</span></td>
        </tr>
      `).join('') || '<tr><td colspan="8">No inventory</td></tr>';
    }

    // ============================================================
    //  UI HELPERS (theme, navigation, etc.)
    // ============================================================
    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
      document.getElementById('tab-' + tabId)?.classList.remove('hidden');
      document.querySelectorAll('#tabsNavBar button').forEach(btn => {
        btn.classList.remove('border-indigo-600', 'text-indigo-600', 'dark:text-indigo-400');
        btn.classList.add('border-transparent', 'text-slate-500', 'dark:text-slate-400');
      });
      const activeBtn = document.getElementById('tab-btn-' + tabId);
      if (activeBtn) {
        activeBtn.classList.remove('border-transparent', 'text-slate-500', 'dark:text-slate-400');
        activeBtn.classList.add('border-indigo-600', 'text-indigo-600', 'dark:text-indigo-400');
      }
    }

    function toggleDarkMode() {
      const current = document.documentElement.getAttribute('data-theme') || 'light';
      const target = current === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', target);
      localStorage.setItem('theme', target);
      document.getElementById('themeIcon').className = target === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    }

    function addOrder() {
      const brand = prompt('Brand (e.g. RBN(PB)):') || 'RBN(PB)';
      const design = prompt('Design name:') || 'CECIL GREEN';
      const size = prompt('Size:') || '9X12';
      const sku = prompt('SKU (optional)') || `GEN-${design.substring(0,3).toUpperCase()}-${size.replace(/X/g,'-')}`;
      const sales = parseFloat(prompt('Sales amount:') || '0');
      const status = prompt('Status (Delivered/Pending):') || 'Pending';
      const newOrder = {
        id: Date.now(),
        date: new Date().toISOString().slice(0,10),
        brand,
        marketplace: 'Amazon',
        design,
        size,
        sku,
        qty: 1,
        sales,
        status,
        carrier: '',
        tracking: '',
        remarks: ''
      };
      appState.orders.push(newOrder);
      renderOrders();
      saveOrdersToFirestore(); // background sync
      pushToast('Order added!', 'success');
    }

    function addSku() {
      const design = prompt('Design name:') || 'NEW DESIGN';
      const size = prompt('Size:') || '9X12';
      const sku = prompt('SKU code:') || `NEW-${design.substring(0,3).toUpperCase()}-${size.replace(/X/g,'-')}`;
      const opening = parseInt(prompt('Opening stock:') || '10') || 0;
      appState.inventory.push({
        sku, design, size, location: 'UP', opening, sold: 0, current: opening, image: '', imageFile: ''
      });
      renderInventory();
      saveInventoryToFirestore();
      pushToast('SKU added!', 'success');
    }

    // ============================================================
    //  TOAST SYSTEM
    // ============================================================
    function pushToast(msg, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `bg-white dark:bg-slate-800 p-3 rounded-lg border-l-4 shadow-lg flex items-center gap-3 ${
        type === 'success' ? 'border-l-emerald-500' : type === 'error' ? 'border-l-rose-500' : 'border-l-blue-500'
      }`;
      toast.innerHTML = `<span class="text-xs font-bold">${msg}</span>
        <button onclick="this.parentElement.remove()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark"></i></button>`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ============================================================
    //  INIT – LOAD AND HIDE OVERLAY
    // ============================================================
    window.addEventListener('DOMContentLoaded', function() {
      // Hide the loading overlay after 2 seconds (or immediately after rendering)
      // First render with defaults
      renderAll();

      // Then try to load from Firestore in background
      loadFromFirestore().then(() => {
        // Re-render with fresh data
        renderAll();
        pushToast('Dashboard synced with Firestore.', 'success');
      }).catch(() => {
        pushToast('Using local data – Firestore unavailable.', 'error');
      });

      // Force hide overlay after 2 seconds
      setTimeout(() => {
        document.getElementById('loadingOverlay').classList.add('hidden');
      }, 2000);

      // Set theme
      const saved = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
      document.getElementById('themeIcon').className = saved === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';

      // Set date
      document.getElementById('systemDate').innerText = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

      // Default tab
      switchTab('dashboard');
    });
  </script>

  <style>
    /* Your existing styles – I've included them above */
  </style>
</head>
<body>
  <!-- LOADING OVERLAY -->
  <div id="loadingOverlay" style="position:fixed; inset:0; background:#f0f2f5; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:9999; font-family:'Segoe UI',system-ui;">
    <div style="width:48px; height:48px; border:4px solid #d5d8dc; border-top:4px solid #6366f1; border-radius:50%; animation: spin 1s linear infinite; margin-bottom:20px;"></div>
    <p style="font-weight:600; font-size:14px; color:#2c3e50;">Loading your dashboard…</p>
    <p style="font-size:12px; color:#5d6d7e; margin-top:4px;">Connecting to Firestore</p>
  </div>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>

  <!-- TOAST CONTAINER -->
  <div id="toastContainer" style="position:fixed; bottom:20px; right:20px; z-index:1000; display:flex; flex-direction:column; gap:10px;"></div>

  <!-- APP CONTAINER -->
  <div id="appContainer" class="flex flex-col min-h-screen">
    <!-- Top bar -->
    <header class="sticky top-0 z-40 flex items-center justify-between px-6 py-3 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 shadow-sm">
      <div class="flex items-center gap-3">
        <div class="bg-indigo-600 text-white p-2 rounded-lg"><i class="fa-solid fa-seedling"></i></div>
        <span class="text-lg font-extrabold tracking-tight text-slate-800 dark:text-white uppercase">Rugs By Nature Dash Board</span>
        <span class="ml-2 text-[10px] bg-amber-50 dark:bg-amber-900/30 text-amber-700 dark:text-amber-400 px-2.5 py-0.5 rounded-full font-bold uppercase tracking-wide border border-amber-200 dark:border-amber-700 hidden sm:inline">Cloud Sync</span>
      </div>
      <div class="flex items-center gap-4">
        <span id="systemDate" class="text-sm font-medium text-slate-500 dark:text-slate-400 hidden lg:inline">Loading...</span>
        <button onclick="toggleDarkMode()" class="p-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-full transition"><i id="themeIcon" class="fa-solid fa-moon"></i></button>
      </div>
    </header>

    <!-- Navigation -->
    <div class="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 overflow-x-auto shadow-sm sticky top-[53px] z-30">
      <ul class="flex px-4 list-none" id="tabsNavBar">
        <li><button onclick="switchTab('dashboard')" id="tab-btn-dashboard" class="flex items-center gap-2 px-5 py-3 font-semibold text-xs border-b-2 border-indigo-600 text-indigo-600 dark:text-indigo-400"><i class="fa-solid fa-chart-line"></i> Dashboard</button></li>
        <li><button onclick="switchTab('orders')" id="tab-btn-orders" class="flex items-center gap-2 px-5 py-3 font-semibold text-xs border-b-2 border-transparent text-slate-500 dark:text-slate-400"><i class="fa-solid fa-cart-shopping"></i> Orders</button></li>
        <li><button onclick="switchTab('inventory')" id="tab-btn-inventory" class="flex items-center gap-2 px-5 py-3 font-semibold text-xs border-b-2 border-transparent text-slate-500 dark:text-slate-400"><i class="fa-solid fa-boxes-stacked"></i> Inventory</button></li>
      </ul>
    </div>

    <!-- Main -->
    <main class="flex-1 p-6 max-w-[1600px] w-full mx-auto">
      <!-- Dashboard -->
      <div id="tab-dashboard" class="tab-content">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6" id="dashboardKpis"></div>
        <div class="card p-5">
          <h3 class="font-bold text-sm text-slate-800 dark:text-white mb-3"><i class="fa-solid fa-chart-bar text-indigo-500 mr-2"></i>Brand Performance</h3>
          <div class="table-container">
            <table>
              <thead><tr><th>Brand</th><th>Orders</th><th>Revenue</th></tr></thead>
              <tbody id="dashboardBrandTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Orders -->
      <div id="tab-orders" class="tab-content hidden">
        <div class="card p-5">
          <div class="flex items-center justify-between mb-4">
            <h3 class="font-bold text-sm text-slate-800 dark:text-white"><i class="fa-solid fa-cart-shopping text-indigo-500 mr-2"></i>Orders Register</h3>
            <button onclick="addOrder()" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold rounded-lg transition"><i class="fa-solid fa-plus mr-1"></i> New Order</button>
          </div>
          <div class="table-container">
            <table>
              <thead><tr><th>Date</th><th>Brand</th><th>Design</th><th>Size</th><th>SKU</th><th>Qty</th><th>Sales</th><th>Status</th></tr></thead>
              <tbody id="ordersTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Inventory -->
      <div id="tab-inventory" class="tab-content hidden">
        <div class="card p-5">
          <div class="flex items-center justify-between mb-4">
            <h3 class="font-bold text-sm text-slate-800 dark:text-white"><i class="fa-solid fa-boxes-stacked text-indigo-500 mr-2"></i>Inventory</h3>
            <button onclick="addSku()" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-semibold rounded-lg transition"><i class="fa-solid fa-plus mr-1"></i> Add SKU</button>
          </div>
          <div class="table-container">
            <table>
              <thead><tr><th>SKU</th><th>Design</th><th>Size</th><th>Loc</th><th>Opening</th><th>Sold</th><th>Current</th><th>Status</th></tr></thead>
              <tbody id="inventoryTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Include styles that are not covered -->
  <style>
    .card { background-color: var(--card, #ffffff); border-radius: 10px; border: 1px solid var(--border, #d5d8dc); padding: 16px; }
    .table-container { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border, #d5d8dc); background-color: var(--card, #ffffff); }
    table { width: 100%; border-collapse: collapse; }
    th { background: rgba(0,0,0,0.04); padding: 10px 12px; border-bottom: 2px solid var(--border, #d5d8dc); font-weight: 700; }
    td { padding: 8px 12px; border-bottom: 1px solid var(--border, #d5d8dc); }
    .badge { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .badge-green { background: #dcfce7; color: #166534; }
    .badge-yellow { background: #fef9c3; color: #854d0e; }
    .badge-red { background: #fee2e2; color: #991b1b; }
    .badge-blue { background: #dbeafe; color: #1e40af; }
    .tab-content.hidden { display: none; }
  </style>
  <!-- ===== FORCE HIDE LOADING OVERLAY ===== -->
<script>
  // Force hide the loading overlay after 2 seconds, regardless of other errors.
  setTimeout(function() {
    const overlay = document.getElementById('loadingOverlay');
    if (overlay) {
      overlay.style.display = 'none'; // hide completely
      overlay.classList.add('hidden');
    }
  }, 2000);
</script>
</body>
  
</html>
